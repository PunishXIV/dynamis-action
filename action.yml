name: "Publish to Dynamis"
description: "Publish a new version of a plugin to Dynamis"

inputs:
    plugin_id:
        description: "The plugin ID in Dynamis"
        required: true
    internal_name:
        description: "The internal name of the plugin in Dynamis"
        required: true
    path:
        description: "The path to the plugin zip file"
        required: true
    type:
        description: "The type of version; `latest` or `testing`"
        default: "testing"
    version_number:
        description: "Override version number (optional - parsed from manifest if not provided)"
        required: false
    game_version:
        description: "Override game version (optional - parsed from manifest if not provided)"
        required: false
    dalamud_version:
        description: "Override Dalamud API level (optional - parsed from manifest if not provided)"
        required: false
    changelog:
        description: "Override changelog (optional - parsed from manifest if not provided)"
        required: false

runs:
    using: "node20"
    main: "dist/index.js"
